name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          python -m pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend-build:
    name: Frontend (lint, type-check, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit tests (vitest)
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  agent-eval:
    name: Agent eval (accuracy regression gate)
    runs-on: ubuntu-latest
    needs: backend-tests
    # Only meaningful with an API key. The steps below are skipped (not failed)
    # when GEMINI_API_KEY is not configured, so PRs from forks still pass.
    defaults:
      run:
        working-directory: backend
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      LLM_PROVIDER: gemini
      LLM_MODEL: ${{ vars.LLM_MODEL || 'gemini-2.5-flash-lite' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        if: ${{ env.GEMINI_API_KEY != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        if: ${{ env.GEMINI_API_KEY != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # The agent talks to a real LLM, which is nondeterministic - so this runs
      # as a tracked quality signal rather than a hard merge blocker
      # (`continue-on-error`). A failing threshold surfaces as a warning
      # annotation + the uploaded JSON report, flagging accuracy/calibration
      # regressions without flaking the build red.
      - name: Run agent evaluation (accuracy + calibration report)
        id: eval
        if: ${{ env.GEMINI_API_KEY != '' }}
        continue-on-error: true
        run: |
          python scripts/run_eval.py --seeds 1,2,3 --threshold 0.7 --json-out eval-report.json

      - name: Upload eval report
        if: ${{ env.GEMINI_API_KEY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: agent-eval-report
          path: backend/eval-report.json
          if-no-files-found: ignore

      - name: Note when eval is skipped
        if: ${{ env.GEMINI_API_KEY == '' }}
        run: echo "GEMINI_API_KEY not set - skipping the live agent eval gate."

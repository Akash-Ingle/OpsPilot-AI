name: Keep demo warm

# The Render free tier spins a service down after ~15 min of inactivity, so the
# first visit then waits 30-60s for a cold start. This scheduled job pings the
# backend health check (and the frontend) every ~10 min so the public demo stays
# responsive for anyone clicking the link.
#
# Notes:
# - GitHub may delay scheduled runs under load, and disables schedules after 60
#   days with no repo activity. That's fine for a demo - it self-heals on push.
# - Override the targets with repo variables BACKEND_URL / FRONTEND_URL if the
#   Render URLs ever change (Settings -> Secrets and variables -> Actions -> Variables).

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

# A new scheduled run shouldn't pile up behind a slow cold start.
concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: ${{ vars.BACKEND_URL || 'https://opspilot-ai-backend-ka0z.onrender.com' }}
      FRONTEND_URL: ${{ vars.FRONTEND_URL || 'https://opspilot-ai-frontend.onrender.com' }}
    steps:
      - name: Ping backend health (waits out a cold start)
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 120 \
            --retry 3 --retry-all-errors --retry-delay 15 "$BACKEND_URL/health")
          echo "backend /health -> $code"
          test "$code" = "200"

      - name: Ping frontend
        run: |
          # /login renders 200 without auth (the dashboard redirects to it).
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 120 \
            --retry 3 --retry-all-errors --retry-delay 15 "$FRONTEND_URL/login")
          echo "frontend /login -> $code"
          # Don't fail the job on a transient frontend blip; the backend ping is
          # what matters for the cold-start experience.
          test "$code" = "200" || echo "::warning::frontend returned $code"

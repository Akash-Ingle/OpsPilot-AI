[pytest]
# Add the backend root (this dir) to sys.path so `import app` resolves the same
# way whether tests are run via `pytest`, `python -m pytest`, or in CI.
pythonpath = .
testpaths = tests
addopts = -q
# Pin the asyncio fixture loop scope to silence pytest-asyncio's "unset" warning.
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning

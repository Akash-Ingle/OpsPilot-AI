# Render Blueprint - deploys the full OpsPilot-AI stack (backend + frontend) as
# two Docker web services. Create via Render Dashboard -> "New +" -> "Blueprint"
# and point it at this repo. Set the GEMINI_API_KEY secret in the dashboard.
#
# Predicted public URLs (assuming the service names below are available):
#   backend : https://opspilot-ai-backend.onrender.com
#   frontend: https://opspilot-ai-frontend.onrender.com
# If Render assigns different URLs (names taken), update the two cross-service
# URLs below (CORS_ORIGINS on the backend, NEXT_PUBLIC_API_URL on the frontend).

# Managed Postgres so users/projects/incidents persist across deploys (the free
# SQLite disk is ephemeral). Render's free Postgres expires after ~30 days; for a
# permanent demo, upgrade the instance.
databases:
  - name: opspilot-ai-db
    plan: free
    databaseName: opspilot
    user: opspilot

services:
  - type: web
    name: opspilot-ai-backend
    runtime: docker
    repo: https://github.com/Akash-Ingle/OpsPilot-AI
    branch: main
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      # Mark the session cookie Secure in production (served over HTTPS).
      - key: SESSION_COOKIE_SECURE
        value: "true"
      # Persistent Postgres connection string, injected from the managed DB above.
      - key: DATABASE_URL
        fromDatabase:
          name: opspilot-ai-db
          property: connectionString
      - key: LLM_PROVIDER
        value: gemini
      # gemini-2.5-flash-lite is the cheapest model with an active free tier.
      # (gemini-2.0-flash currently has a 0-request free-tier quota.)
      - key: LLM_MODEL
        value: gemini-2.5-flash-lite
      # Set this secret in the Render dashboard (never commit a key).
      - key: GEMINI_API_KEY
        sync: false
      # Allow the deployed frontend origin to call the API.
      - key: CORS_ORIGINS
        value: https://opspilot-ai-frontend.onrender.com
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_ANALYZE
        value: 10/minute
      - key: RATE_LIMIT_SIMULATE
        value: 20/minute
      # When the free-tier LLM quota is exhausted, serve a pre-computed analysis
      # for the matching demo scenario instead of erroring, so the demo never breaks.
      - key: DEMO_CACHE_ENABLED
        value: "true"
      # Always-on watcher: auto-open an incident when ingested logs look anomalous.
      # The cooldown caps auto-analysis to once per project per window so a log
      # flood can't burn the free-tier LLM quota.
      - key: AUTO_ANALYZE_ENABLED
        value: "true"
      - key: AUTO_ANALYZE_COOLDOWN_SECONDS
        value: "300"
      # Used to build "View in OpsPilot" links in Slack alerts.
      - key: FRONTEND_BASE_URL
        value: https://opspilot-ai-frontend.onrender.com
      - key: RATE_LIMIT_INGEST
        value: 120/minute

  - type: web
    name: opspilot-ai-frontend
    runtime: docker
    repo: https://github.com/Akash-Ingle/OpsPilot-AI
    branch: main
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # Browser-facing API URL. Render passes this to the Docker build as a
      # build arg (the Dockerfile declares `ARG NEXT_PUBLIC_API_URL`), so it is
      # inlined into the client bundle at build time. The backend service name
      # was taken, so Render assigned it a `-ka0z` suffix; this points at that
      # real URL.
      - key: NEXT_PUBLIC_API_URL
        value: https://opspilot-ai-backend-ka0z.onrender.com/api/v1
      # Scheme+host of the backend (no /api/v1). Feeds next.config.js rewrites so
      # the browser hits the frontend's own origin (/api/v1/*) and the session
      # cookie stays first-party. Must be present at build time (see Dockerfile).
      - key: BACKEND_ORIGIN
        value: https://opspilot-ai-backend-ka0z.onrender.com
